# AI Artifacts Configuration
# yaml-language-server: $schema=./schemas/artifacts.schema.json

version: 1
overlaysDir: .github/overlays

packages:
  hve-core:
    type: git
    repo: https://github.com/microsoft/hve-core.git
    version: hve-core-v3.2.2

artifacts:
  # --- Tool symlinks (source of truth is .github/) ---

  - id: copilot-instructions
    kind: agent
    target: .github/copilot-instructions.md
    steps:
      - render:
          from: hve-core:.github/copilot-instructions.md
          to: .github/copilot-instructions.md
          overlays:
            - hve/repo-context.md
            - hve/copilot-autonomous.md

  - id: claude-instructions
    kind: agent
    target: CLAUDE.md
    steps:
      - link:
          target: AGENTS.md
          to: CLAUDE.md

  - id: claude-commands
    kind: config
    target: .claude/commands
    steps:
      - link:
          target: .github/skills
          to: .claude/commands

  # --- OpenCode (symlinks to .github/ source of truth) ---

  - id: opencode-skills
    kind: config
    target: .opencode/skills
    steps:
      - link:
          target: .github/skills
          to: .opencode/skills

  - id: opencode-agents
    kind: config
    target: .opencode/agent
    steps:
      - link:
          target: .github/agent
          to: .opencode/agent

  # --- Skills (rendered from upstream + overlays) ---

  - id: task-research-guidelines
    kind: skill
    targetDir: .github/skills/task-research-guidelines
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/task-research.prompt.md
          to: SKILL.md
          overlays:
            - hve/repo-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: task-research-guidelines\ndescription:"
            - from: "agent: Task Researcher"
              to: "agent: task-researcher"

  - id: task-plan-guidelines
    kind: skill
    targetDir: .github/skills/task-plan-guidelines
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/task-plan.prompt.md
          to: SKILL.md
          overlays:
            - hve/repo-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: task-plan-guidelines\ndescription:"
            - from: "agent: Task Planner"
              to: "agent: task-planner"

  - id: task-implement-guidelines
    kind: skill
    targetDir: .github/skills/task-implement-guidelines
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/task-implement.prompt.md
          to: SKILL.md
          overlays:
            - hve/repo-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: task-implement-guidelines\ndescription:"
            - from: "agent: Task Implementor"
              to: "agent: task-implementor"

  - id: task-review-checklist
    kind: skill
    targetDir: .github/skills/task-review-checklist
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/task-review.prompt.md
          to: SKILL.md
          overlays:
            - hve/repo-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: task-review-checklist\ndescription:"
            - from: "agent: Task Reviewer"
              to: "agent: task-reviewer"

  - id: prompt-build
    kind: skill
    targetDir: .github/skills/prompt-build
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/prompt-build.prompt.md
          to: SKILL.md
          overlays:
            - hve/prompt-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: prompt-build\ndescription:"
            - from: "agent: Prompt Builder"
              to: "agent: prompt-builder"

  - id: prompt-analyze
    kind: skill
    targetDir: .github/skills/prompt-analyze
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/prompt-analyze.prompt.md
          to: SKILL.md
          overlays:
            - hve/prompt-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: prompt-analyze\ndescription:"
            - from: "agent: Prompt Builder"
              to: "agent: prompt-builder"

  - id: prompt-refactor
    kind: skill
    targetDir: .github/skills/prompt-refactor
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/prompt-refactor.prompt.md
          to: SKILL.md
          overlays:
            - hve/prompt-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: prompt-refactor\ndescription:"
            - from: "agent: Prompt Builder"
              to: "agent: prompt-builder"

  - id: doc-ops-update
    kind: skill
    targetDir: .github/skills/doc-ops-update
    steps:
      - render:
          from: hve-core:.github/prompts/hve-core/doc-ops-update.prompt.md
          to: SKILL.md
          overlays:
            - hve/doc-context.md
          substitutions:
            - from: "---\ndescription:"
              to: "---\nname: doc-ops-update\ndescription:"
            - from: "agent: Doc Ops"
              to: "agent: doc-ops"

# --- Local skills (hand-authored, not managed by upstream) ---
# These live directly in .github/skills/ and are NOT generated:
#   - doc-check: documentation freshness validation
#   - package-maintainer: package code maintenance guidelines
#   - ship: validated commit+push workflow
#   - whitepaper-editor: whitepaper editorial assistance

